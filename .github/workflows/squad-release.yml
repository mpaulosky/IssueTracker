name: Squad Release
# Keeps the current main-push release flow, but validates the real solution first.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.squad/**'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: Global.json

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.5.0
        with:
          versionSpec: '6.x'

      - name: Use GitVersion
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.5.0

      - name: Set version outputs
        id: version
        run: |
          VERSION=${{ steps.gitversion.outputs.fullSemVer }}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VERSION (tag: v$VERSION)"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "⏭️ Tag ${{ steps.version.outputs.tag }} already exists — skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "🆕 Tag ${{ steps.version.outputs.tag }} does not exist — creating release."
          fi

      - name: Restore dependencies
        if: steps.check_tag.outputs.exists == 'false'
        run: dotnet restore IssueTracker.slnx

      - name: Build solution
        if: steps.check_tag.outputs.exists == 'false'
        run: dotnet build IssueTracker.slnx --configuration Release --no-restore

      - name: Run fast release validation tests
        if: steps.check_tag.outputs.exists == 'false'
        shell: bash
        run: |
          set -euo pipefail

          projects=(
            tests/Architecture.Tests/Architecture.Tests.csproj
            tests/AppHost.Tests/AppHost.Tests.csproj
            tests/Integration.Tests/Integration.Tests.csproj
            tests/IssueTracker.CoreBusiness.Tests.Unit/IssueTracker.CoreBusiness.Tests.Unit.csproj
            tests/IssueTracker.PlugIns.Tests.Unit/IssueTracker.PlugIns.Tests.Unit.csproj
            tests/IssueTracker.Services.Tests.Unit/IssueTracker.Services.Tests.Unit.csproj
            tests/IssueTracker.UI.Tests.Unit/IssueTracker.UI.Tests.Unit.csproj
            tests/ServiceDefaults.Tests/ServiceDefaults.Tests.csproj
          )

          for project in "${projects[@]}"; do
            echo "=== Running ${project} ==="
            dotnet test "$project" \
              --configuration Release \
              --no-build \
              --no-restore \
              --verbosity minimal
          done

      - name: Create git tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes \
            --latest

      - name: Verify release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ steps.version.outputs.tag }}"
          echo "✅ Release ${{ steps.version.outputs.tag }} created and verified."
