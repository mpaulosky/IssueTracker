name: Squad Main Validation
# Validates the protected main branch after merge.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: Global.json

      - name: Restore dependencies
        run: dotnet restore IssueTracker.slnx

      - name: Build solution
        run: dotnet build IssueTracker.slnx --configuration Release --no-restore

      - name: Run fast validation tests
        shell: bash
        run: |
          set -euo pipefail

          projects=(
            tests/Architecture.Tests/Architecture.Tests.csproj
            tests/AppHost.Tests/AppHost.Tests.csproj
            tests/Integration.Tests/Integration.Tests.csproj
            tests/IssueTracker.CoreBusiness.Tests.Unit/IssueTracker.CoreBusiness.Tests.Unit.csproj
            tests/IssueTracker.PlugIns.Tests.Unit/IssueTracker.PlugIns.Tests.Unit.csproj
            tests/IssueTracker.Services.Tests.Unit/IssueTracker.Services.Tests.Unit.csproj
            tests/IssueTracker.UI.Tests.Unit/IssueTracker.UI.Tests.Unit.csproj
            tests/ServiceDefaults.Tests/ServiceDefaults.Tests.csproj
          )

          for project in "${projects[@]}"; do
            echo "=== Running ${project} ==="
            dotnet test "$project" \
              --configuration Release \
              --no-build \
              --no-restore \
              --verbosity minimal
          done

      - name: Check no .squad/ files are tracked
        run: |
          if git ls-files --error-unmatch .squad/ 2>/dev/null; then
            echo "::error::❌ .squad/ files are tracked on main — this must not ship."
            exit 1
          fi
          echo "✅ No .squad/ files tracked — main is clean for release."
