name: Squad CI
# Fast restore/build gate for feature branches and PRs into protected main.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.squad/**'
  push:
    branches-ignore: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.squad/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    name: Squad CI
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: Global.json

      - name: Restore dependencies
        run: dotnet restore IssueTracker.slnx

      - name: Build solution
        run: dotnet build IssueTracker.slnx --configuration Release --no-restore

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: Global.json

      - name: Restore dependencies
        run: dotnet restore tests/Architecture.Tests/Architecture.Tests.csproj

      - name: Run fast smoke tests
        run: dotnet test tests/Architecture.Tests/Architecture.Tests.csproj --configuration Release --no-restore --verbosity minimal
