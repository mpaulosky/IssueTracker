name: Squad CI
# Fast restore/build gate for feature branches and PRs into protected main.

on:
  pull_request:
    branches: [dev, main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.squad/**'
  push:
    branches: [dev]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.squad/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    name: Squad CI
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: Global.json

      - name: Restore dependencies
        run: dotnet restore IssueTracker.slnx

      - name: Build solution
        run: dotnet build IssueTracker.slnx --configuration Release --no-restore

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: build

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: Global.json

      - name: Restore dependencies
        run: dotnet restore IssueTracker.slnx

      - name: Run fast test suite
        shell: bash
        run: |
          set -euo pipefail
          projects=(
            tests/Architecture.Tests/Architecture.Tests.csproj
            tests/AppHost.Tests/AppHost.Tests.csproj
            tests/Integration.Tests/Integration.Tests.csproj
            tests/IssueTracker.CoreBusiness.Tests.Unit/IssueTracker.CoreBusiness.Tests.Unit.csproj
            tests/IssueTracker.PlugIns.Tests.Unit/IssueTracker.PlugIns.Tests.Unit.csproj
            tests/IssueTracker.Services.Tests.Unit/IssueTracker.Services.Tests.Unit.csproj
            tests/IssueTracker.UI.Tests.Unit/IssueTracker.UI.Tests.Unit.csproj
            tests/ServiceDefaults.Tests/ServiceDefaults.Tests.csproj
          )

          for project in "${projects[@]}"; do
            dotnet test "$project" --configuration Release --no-restore --verbosity minimal
          done
