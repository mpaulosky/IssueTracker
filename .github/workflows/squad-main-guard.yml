name: Squad Protected Branch Guard

on:
  pull_request:
    branches: [main, preview]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for forbidden paths
        uses: actions/github-script@v9
        with:
          script: |
            // Fetch all files changed in this PR (paginated)
            const files = [];
            let page = 1;
            while (true) {
              const resp = await github.rest.pulls.listFiles({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100,
                page
              });
              files.push(...resp.data);
              if (resp.data.length < 100) break;
              page++;
            }

            // Check each file against forbidden path rules
            // Allow removals — deleting forbidden files from protected branches is fine
            const forbidden = files
              .filter(f => f.status !== 'removed')
              .map(f => f.filename)
              .filter(f => {
                // .squad runtime state only (logs, inbox, volatile histories)
                if (f.startsWith('.squad/log/')) return true;
                if (f.startsWith('.squad/orchestration-log/')) return true;
                if (f.startsWith('.squad/decisions/inbox/')) return true;
                if (f === '.squad/decisions.md') return true;
                if (f === '.squad/casting/history.json') return true;
                if (/^\.squad\/agents\/[^/]+\/history\.md$/.test(f)) return true;
                // team-docs/** — ALL internal team docs, zero exceptions
                if (f.startsWith('team-docs/')) return true;
                return false;
              });

            const baseBranch = context.payload.pull_request.base.ref;
            const headBranch = context.payload.pull_request.head.ref;
            const headRepo = context.payload.pull_request.head.repo.full_name;
            const expectedRepo = `${context.repo.owner}/${context.repo.repo}`;
            if (baseBranch === 'main' && (headBranch !== 'dev' || headRepo !== expectedRepo)) {
              core.setFailed(`PRs to main must come from the repo's dev branch. Current source: ${headRepo}:${headBranch}`);
              return;
            }

            if (forbidden.length === 0) {
              core.info('✅ No forbidden paths found in PR — all clear.');
              return;
            }

            // Build a clear, actionable error message
            const lines = [
              `## 🚫 Forbidden files detected in PR to ${baseBranch}`,
              '',
              `The following files must NOT be merged into \`${baseBranch}\`.`,
              'Squad runtime state belongs on dev branches only (`.squad/log`, inbox files, volatile histories).',
              '`team-docs/` is internal team content — it belongs on dev branches only.',
              '',
              '### Forbidden files found:',
              '',
              ...forbidden.map(f => `- \`${f}\``),
              '',
              '### How to fix:',
              '',
              '```bash',
              '# Remove tracked .squad runtime files (examples):',
              'git rm --cached -r .squad/log/ .squad/orchestration-log/ .squad/decisions/inbox/',
              'git rm --cached .squad/decisions.md .squad/casting/history.json',
              'git rm --cached .squad/agents/*/history.md',
              '',
              '# Remove tracked team-docs/ files:',
              'git rm --cached -r team-docs/',
              '',
              '# Commit the removal and push:',
              'git commit -m "chore: remove forbidden paths from PR"',
              'git push',
              '```',
              '',
              '> ⚠️ `.squad` templates/config may be versioned; runtime state is not.',
              '> The guard workflow is the enforcement mechanism that keeps runtime state off protected branches.',
              '> `git rm --cached` untracks them from this PR without deleting your local copies.',
            ];

            core.setFailed(lines.join('\n'));
