name: Lint YAML
# Validates actively maintained GitHub workflow YAML on feature branches and PRs into main.

on:
  push:
    branches-ignore: [main]
    paths:
      - '**/*.yml'
      - '**/*.yaml'
  pull_request:
    branches: [dev, main]
    paths:
      - '**/*.yml'
      - '**/*.yaml'

permissions:
  contents: read

jobs:
  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Run yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .github/workflows
          config_data: |
            extends: default
            ignore: |
              .squad/
              .github/workflows/code-metrics.yml
              .github/workflows/dotnetdev.yml
              .github/workflows/squad-label-enforce.yml
            rules:
              document-start: disable
              line-length:
                max: 200
                allow-non-breakable-inline-mappings: true
              truthy:
                allowed-values: ['true', 'false', 'on']
              brackets:
                min-spaces-inside: 0
                max-spaces-inside: 1
